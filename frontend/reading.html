<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Exam - TOEFL Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <a href="dashboard.html" class="logo">TOEFL Prep</a>
        <div style="font-weight: 600; color: var(--text-muted);">Section 1: Reading</div>
        <nav class="nav-links">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle Dark Mode">
                <i data-lucide="moon"></i>
            </button>
            <button class="btn btn-outline" onclick="quitExam()">Quit Exam</button>
        </nav>
    </header>

    <main class="exam-layout">
        <!-- Pre-Test Info Screen (Modal UI) -->
        <div id="pre-test-screen" class="animate-in" style="position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 1rem;">
            <div class="bg-white dark:bg-black rounded-3xl p-8 max-w-md w-full shadow-2xl zoom-in" style="background-color: var(--bg-main); border: 1px solid var(--border-color);">
                <div style="display: flex; align-items: center; justify-content: center; width: 64px; height: 64px; background-color: rgba(245, 158, 11, 0.2); color: #f59e0b; border-radius: 50%; margin: 0 auto 1.5rem auto;">
                    <i data-lucide="alert-triangle" style="width: 32px; height: 32px;"></i>
                </div>
                
                <h2 style="font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem;" id="pre-test-title">Ready to Start?</h2>
                
                <div style="background-color: var(--bg-secondary); border-radius: 0.75rem; padding: 1rem; margin-bottom: 1.5rem;">
                    <p style="color: var(--text-muted); text-align: center; margin-bottom: 0.75rem;">This section operates under strict exam conditions.</p>
                    <ul style="list-style: none; font-size: 0.875rem; font-weight: 600; display: flex; flex-direction: column; gap: 0.5rem;">
                        <li style="display: flex; align-items: center; justify-content: space-between; color: #d97706; background-color: rgba(245, 158, 11, 0.1); padding: 0.5rem 0.75rem; border-radius: 0.5rem;">
                            <span style="display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="clock" style="width: 16px;"></i> Time Limit</span>
                            <span><span id="pre-test-time">--</span> Minutes</span>
                        </li>
                        <li style="display: flex; align-items: center; justify-content: space-between; background-color: var(--bg-main); padding: 0.5rem 0.75rem; border-radius: 0.5rem;">
                            <span>Auto-Submit</span>
                            <span>Enabled</span>
                        </li>
                    </ul>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button class="btn btn-outline" style="flex: 1; justify-content: center; font-weight: 700;" onclick="window.location.href='dashboard.html'">Cancel</button>
                    <button class="btn btn-primary shadow-lg hover-scale" id="start-exam-btn" style="flex: 1; justify-content: center; font-weight: 700;" onclick="startActualExam()" disabled>Loading...</button>
                </div>
            </div>
        </div>

        <!-- Actual Exam View -->
        <div class="split-view" id="exam-view" style="display: none;">
            <!-- Left Pane: Reading Passage -->
            <div class="pane passage-pane">
                <h2 id="passage-title" style="margin-bottom: 1.5rem;">Loading...</h2>
                <div class="passage-content" id="passage-content">
                    Loading passage...
                </div>
            </div>

            <!-- Right Pane: Questions -->
            <div class="pane question-pane">
                <div class="exam-header">
                    <div>
                        <span style="font-weight: 600; font-size: 14px; color: var(--text-muted); text-transform: uppercase;">Task: Reading</span>
                        <div style="font-size: 14px; margin-top: 4px;">Question <span id="current-q-num">1</span> of <span id="total-q-num">1</span></div>
                    </div>
                    <div class="timer" id="exam-timer">
                        <i data-lucide="clock" style="width: 20px;"></i>
                        <span id="time-display">--:--</span>
                    </div>
                </div>

                <div class="question-block" id="question-container">
                    <!-- Injected via JS -->
                </div>

                <div id="question-grid" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 2rem;">
                    <!-- Grid boxes injected via JS -->
                </div>

                <div class="exam-footer">
                    <button class="btn btn-secondary" id="btn-back" onclick="navigate(-1)" disabled>
                        <i data-lucide="arrow-left" style="width: 18px;"></i> Back
                    </button>
                    <button class="btn btn-primary" id="btn-next" onclick="navigate(1)">
                        Next <i data-lucide="arrow-right" style="width: 18px;"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script src="reading.js"></script>
</body>
</html>
