<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Material - TOEFL Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .pdf-viewer {
            width: 100%;
            height: 70vh;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--text-muted);
        }
        .bookmark-btn {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <a href="dashboard.html" class="logo">TOEFL Prep</a>
        <nav class="nav-links">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle Dark Mode">
                <i data-lucide="moon"></i>
            </button>
            <a href="dashboard.html" class="btn btn-outline">Back to Dashboard</a>
        </nav>
    </header>

    <main style="padding: 2rem; max-width: 1000px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem;">
            <div>
                <h2 id="material-title" style="margin-bottom: 0.5rem;">Loading Material...</h2>
                <span class="badge" style="background-color: var(--primary-color); color: white;" id="material-type">PDF</span>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-outline" id="btn-bookmark" onclick="toggleBookmark()"><i data-lucide="bookmark"></i> Bookmark</button>
                <button class="btn btn-primary" onclick="window.print()"><i data-lucide="printer"></i> Print / Save</button>
            </div>
        </div>

        <div class="alert" id="resume-alert" style="display: none; margin-bottom: 1rem; background-color: rgba(16, 185, 129, 0.1); color: #10b981; border-color: #10b981; cursor: pointer;" onclick="resumeReading()">
            <i data-lucide="info"></i> You left off on Page <span id="resume-page"></span>. Click here to resume.
        </div>

        <div style="position: relative;">
            <div class="pdf-viewer" id="pdf-viewer">
                <i data-lucide="file-text" style="width: 48px; height: 48px; margin-bottom: 1rem;"></i>
                <p>PDF rendering engine initialized.</p>
                <p style="font-size: 14px; margin-top: 1rem;">(In a full production build, this embeds PDF.js or an iframe to the exact file_url)</p>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; background-color: var(--bg-secondary); padding: 1rem; border-radius: 8px;">
                <button class="btn btn-secondary" onclick="changePage(-1)"><i data-lucide="chevron-left"></i> Prev</button>
                <span style="font-weight: 600;">Page <span id="current-page">1</span> of <span id="total-pages">45</span></span>
                <button class="btn btn-secondary" onclick="changePage(1)">Next <i data-lucide="chevron-right"></i></button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script src="materials.js"></script>
</body>
</html>
