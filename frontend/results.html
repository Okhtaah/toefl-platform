<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Score Report - TOEFL Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <a href="dashboard.html" class="logo">TOEFL Prep</a>
        <nav class="nav-links">
            <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle Dark Mode">
                <i data-lucide="moon"></i>
            </button>
            <a href="dashboard.html" class="btn btn-outline">Back to Dashboard</a>
        </nav>
    </header>

    <main style="padding: 4rem 2rem; max-width: 800px; margin: 0 auto;">
        <div class="card" style="text-align: center; margin-bottom: 2rem;">
            <i data-lucide="award" style="width: 64px; height: 64px; color: var(--primary-color); margin-bottom: 1rem;"></i>
            <h2>Detailed Score Report</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Review your performance and instructor feedback.</p>
            
            <div style="display: flex; justify-content: center; gap: 4rem; margin-bottom: 2rem;">
                <div>
                    <div style="font-size: 14px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Total Score</div>
                    <div style="font-size: 48px; font-weight: 700; color: var(--primary-color);" id="final-score">--</div>
                    <div style="font-size: 14px; color: var(--text-muted);">out of 120</div>
                </div>
                <div>
                    <div style="font-size: 14px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Time Spent</div>
                    <div style="font-size: 48px; font-weight: 700; color: var(--text-main);" id="time-spent">--:--</div>
                </div>
            </div>
            
            <a href="dashboard.html" class="btn btn-secondary">Return to Dashboard</a>
        </div>

        <div id="detailed-report">
            <div class="skeleton" style="height: 150px; margin-bottom: 1rem;"></div>
            <div class="skeleton" style="height: 150px;"></div>
        </div>
    </main>

    <script src="app.js"></script>
    <script src="results.js"></script>
</body>
</html>
